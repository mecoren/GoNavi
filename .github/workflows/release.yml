name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Test release asset contracts
        run: |
          python3 tools/generate-update-latest-manifest.test.py
          python3 tools/windows-release-artifacts.test.py

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Cache frontend node_modules
        uses: actions/cache@v5
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-node20-frontend-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Wails
        run: go install -v github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Build frontend dist
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p frontend/dist
          printf '<!doctype html><title>GoNavi</title>\n' > frontend/dist/index.html
          wails generate module
          node frontend/scripts/wails-frontend-install.mjs
          npm --prefix frontend run build

      - name: Pack frontend dist
        shell: bash
        run: tar -cf frontend-dist.tar -C frontend/dist .

      - name: Upload frontend dist
        uses: actions/upload-artifact@v6
        with:
          name: frontend-dist
          path: frontend-dist.tar
          if-no-files-found: error
          retention-days: 1

  driver_agents:
    name: Detect changed driver agents
    runs-on: ubuntu-latest
    outputs:
      drivers: ${{ steps.detect.outputs.drivers }}
      has_changes: ${{ steps.detect.outputs.has_changes }}
      release_source: ${{ steps.detect.outputs.release_source }}
      compare_base: ${{ steps.detect.outputs.compare_base }}
      force_global_driver_builds: ${{ steps.detect.outputs.force_global_driver_builds }}
      published_source_commit: ${{ steps.published_source.outputs.source_commit }}
      has_manifest: ${{ steps.published_source.outputs.has_manifest }}
      manifest_valid: ${{ steps.published_source.outputs.manifest_valid }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve published driver release source
        id: published_source
        env:
          DRIVER_RELEASE_TOKEN: ${{ secrets.DRIVER_RELEASE_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          PREV_TAG="$(git describe --tags --match 'v*' --abbrev=0 "${GITHUB_SHA}^" 2>/dev/null || true)"
          manifest_path="$RUNNER_TEMP/published-driver-manifest.json"
          if [[ -z "$PREV_TAG" ]]; then
            echo "source_commit=" >> "$GITHUB_OUTPUT"
            echo "has_manifest=false" >> "$GITHUB_OUTPUT"
            echo "manifest_valid=false" >> "$GITHUB_OUTPUT"
            echo "🧭 No previous stable tag found; full rebuild will be used"
            exit 0
          fi
          SOURCE_COMMIT="$(python3 tools/resolve-driver-release-source.py --repo Syngnat/GoNavi-DriverAgents --tag "$PREV_TAG" --manifest-output "$manifest_path")"
          echo "source_commit=${SOURCE_COMMIT}" >> "$GITHUB_OUTPUT"
          if [[ -s "$manifest_path" ]]; then
            echo "has_manifest=true" >> "$GITHUB_OUTPUT"
            echo "🧭 Published driver release exposes revision manifest"
          else
            echo "has_manifest=false" >> "$GITHUB_OUTPUT"
            echo "🧭 Published driver release has no revision manifest"
          fi
          if [[ -n "$SOURCE_COMMIT" && -s "$manifest_path" ]]; then
            if bash ./tools/validate-driver-release-manifest.sh --commit "$SOURCE_COMMIT" --manifest "$manifest_path"; then
              if python3 tools/validate-driver-release-assets.py --repo Syngnat/GoNavi-DriverAgents --tag "$PREV_TAG"; then
                echo "manifest_valid=true" >> "$GITHUB_OUTPUT"
                echo "🧭 Published driver release manifest and actual assets are consistent with its source commit"
              else
                echo "manifest_valid=false" >> "$GITHUB_OUTPUT"
                echo "⚠️ Published driver release assets do not match manifest; forcing full rebuild"
              fi
            else
              echo "manifest_valid=false" >> "$GITHUB_OUTPUT"
              echo "⚠️ Published driver release manifest is stale; forcing full rebuild"
            fi
          else
            echo "manifest_valid=false" >> "$GITHUB_OUTPUT"
          fi
          if [[ -n "$SOURCE_COMMIT" ]]; then
            echo "🧭 Last published release source commit (${PREV_TAG}): $SOURCE_COMMIT"
          else
            echo "🧭 Unable to resolve published release source commit for ${PREV_TAG}; fallback to previous tag diff"
          fi

      - name: Detect changed driver agents
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          merge_csv() {
            local current="$1"
            local incoming="$2"
            local merged="$current"
            local seen=",${current},"
            local item
            IFS=',' read -r -a items <<< "$incoming"
            for item in "${items[@]}"; do
              item="$(printf '%s' "$item" | tr '[:upper:]' '[:lower:]' | tr -d '[:space:]')"
              if [[ -z "$item" ]]; then
                continue
              fi
              if [[ "$seen" == *",$item,"* ]]; then
                continue
              fi
              if [[ -n "$merged" ]]; then
                merged="${merged},${item}"
              else
                merged="$item"
              fi
              seen="${seen}${item},"
            done
            printf '%s\n' "$merged"
          }

          git fetch --force --tags
          PREV_TAG="$(git describe --tags --match 'v*' --abbrev=0 "${GITHUB_SHA}^" 2>/dev/null || true)"
          if [ -n "$PREV_TAG" ]; then
            BASE_REF="$PREV_TAG"
            RELEASE_SOURCE="$PREV_TAG"
          else
            BASE_REF="all"
            RELEASE_SOURCE="all"
          fi
          HAS_MANIFEST="${{ steps.published_source.outputs.has_manifest }}"
          MANIFEST_VALID="${{ steps.published_source.outputs.manifest_valid }}"
          if [[ "$RELEASE_SOURCE" != "all" && "$HAS_MANIFEST" != "true" ]]; then
            echo "⚠️ Published driver release lacks revision manifest; forcing full rebuild to self-heal old assets"
            BASE_REF="all"
            RELEASE_SOURCE="all"
          elif [[ "$RELEASE_SOURCE" != "all" && "$MANIFEST_VALID" != "true" ]]; then
            echo "⚠️ Published driver release manifest is stale; forcing full rebuild to self-heal old assets"
            BASE_REF="all"
            RELEASE_SOURCE="all"
          fi
          DRIVERS="$(bash ./tools/detect-changed-driver-agents.sh --base "$BASE_REF" --head "$GITHUB_SHA")"
          if [[ "$BASE_REF" != "all" ]]; then
            REVISION_DRIVERS=""
            for PLATFORM in darwin/amd64 darwin/arm64 windows/amd64 windows/arm64 linux/amd64 linux/arm64; do
              PLATFORM_DRIVERS="$(bash ./tools/diff-driver-agent-revisions.sh --base "$BASE_REF" --head "$GITHUB_SHA" --platform "$PLATFORM")" || {
                echo "⚠️ 平台 revision 差异对比失败（${PLATFORM}），保守回退为全量驱动重建"
                DRIVERS="$(bash ./tools/detect-changed-driver-agents.sh --base all --head "$GITHUB_SHA")"
                REVISION_DRIVERS=""
                break
              }
              REVISION_DRIVERS="$(merge_csv "$REVISION_DRIVERS" "$PLATFORM_DRIVERS")"
            done
            if [[ -n "$REVISION_DRIVERS" ]]; then
              echo "🧭 Revision diff union drivers: $REVISION_DRIVERS"
              DRIVERS="$(merge_csv "$DRIVERS" "$REVISION_DRIVERS")"
            fi
          fi
          FORCE_GLOBAL_DRIVER_BUILDS="$(bash ./tools/should-force-global-driver-builds.sh --base "$BASE_REF" --head "$GITHUB_SHA")"
          echo "drivers=${DRIVERS}" >> "$GITHUB_OUTPUT"
          echo "release_source=${RELEASE_SOURCE}" >> "$GITHUB_OUTPUT"
          echo "compare_base=${BASE_REF}" >> "$GITHUB_OUTPUT"
          echo "force_global_driver_builds=${FORCE_GLOBAL_DRIVER_BUILDS}" >> "$GITHUB_OUTPUT"
          if [ -n "$DRIVERS" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "🧭 Changed driver agents since ${BASE_REF}: $DRIVERS"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "🧭 No driver-agent changes since ${BASE_REF}"
          fi
          if [[ "$FORCE_GLOBAL_DRIVER_BUILDS" == "true" ]]; then
            echo "🧭 Driver build/release plumbing changed; preserve global driver rebuild set on every platform"
          fi

  # Phase 1: Build in parallel and output artifacts
  build:
    name: Build ${{ matrix.platform }}
    needs:
      - frontend
      - driver_agents
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: darwin/amd64
            os_name: MacOS
            arch_name: Amd64
            build_name: gonavi-build-darwin-amd64
            wails_tags: ""
            artifact_suffix: ""
            build_optional_agents: true
            linux_webkit: ""
          - os: macos-latest
            platform: darwin/arm64
            os_name: MacOS
            arch_name: Arm64
            build_name: gonavi-build-darwin-arm64
            wails_tags: ""
            artifact_suffix: ""
            build_optional_agents: true
            linux_webkit: ""
          - os: windows-2025-vs2026
            platform: windows/amd64
            os_name: Windows
            arch_name: Amd64
            build_name: gonavi-build-windows-amd64
            wails_tags: ""
            artifact_suffix: ""
            build_optional_agents: true
            linux_webkit: ""
          - os: windows-2025-vs2026
            platform: windows/arm64
            os_name: Windows
            arch_name: Arm64
            build_name: gonavi-build-windows-arm64
            wails_tags: ""
            artifact_suffix: ""
            build_optional_agents: true
            linux_webkit: ""
          - os: ubuntu-22.04
            platform: linux/amd64
            os_name: Linux
            arch_name: Amd64
            build_name: gonavi-build-linux-amd64
            wails_tags: ""
            artifact_suffix: ""
            build_optional_agents: true
            linux_webkit: "4.0"
          - os: ubuntu-22.04-arm
            platform: linux/arm64
            os_name: Linux
            arch_name: Arm64
            build_name: gonavi-build-linux-arm64
            wails_tags: ""
            artifact_suffix: ""
            build_optional_agents: true
            linux_webkit: "4.0"
          # Debian 13 (trixie) 默认仓库已切到 WebKitGTK 4.1：单独提供 4.1 变体产物
          - os: ubuntu-24.04
            platform: linux/amd64
            os_name: Linux
            arch_name: Amd64
            build_name: gonavi-build-linux-amd64-webkit41
            wails_tags: "webkit2_41"
            artifact_suffix: "-WebKit41"
            build_optional_agents: false
            linux_webkit: "4.1"

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Download frontend dist
        id: download_frontend_dist
        continue-on-error: true
        uses: actions/download-artifact@v7
        with:
          name: frontend-dist
          path: frontend-artifact

      - name: Reset failed frontend dist download
        if: steps.download_frontend_dist.outcome != 'success'
        shell: bash
        run: rm -rf frontend-artifact

      - name: Retry frontend dist download
        if: steps.download_frontend_dist.outcome != 'success'
        uses: actions/download-artifact@v7
        with:
          name: frontend-dist
          path: frontend-artifact

      - name: Extract frontend dist
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p frontend/dist
          test -s frontend-artifact/frontend-dist.tar
          tar -xf frontend-artifact/frontend-dist.tar -C frontend/dist
          test -s frontend/dist/index.html

      - name: Install UPX (Windows)
        if: matrix.platform == 'windows/amd64'
        shell: pwsh
        run: |
          $UPX_VERSION = "4.2.4"
          $url = "https://github.com/upx/upx/releases/download/v${UPX_VERSION}/upx-${UPX_VERSION}-win64.zip"
          $zipPath = "$env:RUNNER_TEMP\upx.zip"
          $extractPath = "$env:RUNNER_TEMP\upx"
          Write-Host "📥 从 GitHub Releases 下载 UPX v${UPX_VERSION} ..."
          Invoke-WebRequest -Uri $url -OutFile $zipPath -UseBasicParsing
          Expand-Archive -Path $zipPath -DestinationPath $extractPath -Force
          $upxDir = Get-ChildItem -Path $extractPath -Directory | Select-Object -First 1
          "$($upxDir.FullName)" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
          $upxCmd = Join-Path $upxDir.FullName "upx.exe"
          if (!(Test-Path $upxCmd)) {
            Write-Error "❌ 未检测到 upx，无法保证 Windows 产物经过压缩"
            exit 1
          }
          & $upxCmd --version

      - name: Install WiX Toolset (Windows)
        if: contains(matrix.platform, 'windows')
        shell: pwsh
        run: |
          $wixVersion = "6.0.2"
          $wixTools = Join-Path $env:RUNNER_TEMP "wix-tools"
          dotnet tool install wix --tool-path $wixTools --version $wixVersion
          if ($LASTEXITCODE -ne 0) {
              throw "WiX Toolset 安装失败，退出码: $LASTEXITCODE"
          }
          $wixTools | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
          $env:PATH = "$wixTools;$env:PATH"
          wix extension add --global "WixToolset.UI.wixext/$wixVersion"
          if ($LASTEXITCODE -ne 0) {
              throw "WiX UI 扩展安装失败，退出码: $LASTEXITCODE"
          }
          wix --version

      # Linux Dependencies (GTK3, WebKit2GTK required by Wails)
      - name: Install Linux Dependencies
        if: contains(matrix.platform, 'linux')
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev

          # WebKitGTK 4.1 需要 libsoup3；4.0 使用 libsoup2（通常由 webkit2gtk dev 包拉起）
          if [ "${{ matrix.linux_webkit }}" = "4.1" ]; then
            sudo apt-get install -y libwebkit2gtk-4.1-dev libsoup-3.0-dev
          else
            sudo apt-get install -y libwebkit2gtk-4.0-dev
          fi

          sudo apt-get install -y upx-ucl || sudo apt-get install -y upx
          upx --version

          # AppImage 运行/打包可能需要 FUSE2。不同发行版/版本包名不同，做兼容兜底。
          sudo apt-get install -y libfuse2 || sudo apt-get install -y libfuse2t64 || true

          if [ "${{ matrix.arch_name }}" != "Amd64" ]; then
            echo "⚠️ Linux arm64 暂不生成 AppImage，仅产出 tar.gz"
            touch /tmp/skip-appimage
            exit 0
          fi

          # Download linuxdeploy tools for AppImage packaging
          LINUXDEPLOY_URL="https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage"
          PLUGIN_URL="https://github.com/linuxdeploy/linuxdeploy-plugin-gtk/releases/download/continuous/linuxdeploy-plugin-gtk-x86_64.AppImage"

          echo "📥 下载 linuxdeploy..."
          wget --retry-connrefused --waitretry=1 --read-timeout=20 --timeout=15 --tries=3 \
            -O /tmp/linuxdeploy "$LINUXDEPLOY_URL" || {
            echo "⚠️ linuxdeploy 下载失败，AppImage 打包将跳过"
            touch /tmp/skip-appimage
          }

          echo "📥 下载 linuxdeploy-plugin-gtk..."
          wget --retry-connrefused --waitretry=1 --read-timeout=20 --timeout=15 --tries=3 \
            -O /tmp/linuxdeploy-plugin-gtk "$PLUGIN_URL" || {
            echo "⚠️ linuxdeploy-plugin-gtk 下载失败，AppImage 打包将跳过"
            touch /tmp/skip-appimage
          }

          if [ ! -f /tmp/skip-appimage ]; then
            chmod +x /tmp/linuxdeploy /tmp/linuxdeploy-plugin-gtk
            echo "✅ AppImage 工具准备完成"
          fi

      - name: Install Wails
        run: go install -v github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Setup MSYS2 Toolchain For DuckDB (Windows AMD64)
        id: msys2_duckdb
        if: ${{ matrix.platform == 'windows/amd64' }}
        continue-on-error: true
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-binutils

      - name: Configure DuckDB CGO Toolchain (Windows AMD64)
        if: ${{ matrix.platform == 'windows/amd64' }}
        shell: pwsh
        run: |
          function Find-MingwBin([string[]]$candidates) {
            foreach ($bin in $candidates) {
              if ([string]::IsNullOrWhiteSpace($bin)) {
                continue
              }
              $gcc = Join-Path $bin 'gcc.exe'
              $gxx = Join-Path $bin 'g++.exe'
              if ((Test-Path $gcc) -and (Test-Path $gxx)) {
                return $bin
              }
            }
            return $null
          }

          $msys2Outcome = "${{ steps.msys2_duckdb.outcome }}"
          $msys2Location = "${{ steps.msys2_duckdb.outputs['msys2-location'] }}"
          $candidateBins = @()
          if (-not [string]::IsNullOrWhiteSpace($msys2Location)) {
            $candidateBins += Join-Path $msys2Location 'ucrt64\bin'
          }
          $candidateBins += @(
            'C:\msys64\ucrt64\bin',
            'D:\a\_temp\msys64\ucrt64\bin'
          )
          $candidateBins = @($candidateBins | Select-Object -Unique)

          $mingwBin = Find-MingwBin $candidateBins
          if (-not $mingwBin) {
            if ($msys2Outcome -ne 'success') {
              Write-Warning "⚠️ MSYS2 安装步骤结果为 $msys2Outcome，回退到 UCRT64 本机路径探测"
            } else {
              Write-Warning "⚠️ MSYS2 已执行，但未找到 UCRT64 gcc/g++，回退到本机路径探测"
            }
            $mingwBin = Find-MingwBin $candidateBins
          }

          if (-not $mingwBin) {
            Write-Error "❌ 未找到可用的 DuckDB UCRT64 编译器。已检查：$($candidateBins -join ', ')"
            exit 1
          }

          $gcc = (Join-Path $mingwBin 'gcc.exe')
          $gxx = (Join-Path $mingwBin 'g++.exe')

          if (!(Test-Path $gcc) -or !(Test-Path $gxx)) {
            Write-Error "❌ DuckDB 编译器缺失：gcc=$gcc g++=$gxx"
            exit 1
          }

          "$mingwBin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
          "CC=$gcc" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "CXX=$gxx" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "✅ 已配置 DuckDB cgo 编译器: gcc=$gcc g++=$gxx"

      - name: Verify DuckDB CGO Toolchain (Windows AMD64)
        if: ${{ matrix.platform == 'windows/amd64' }}
        shell: pwsh
        run: |
          & "$env:CC" --version
          & "$env:CXX" --version

      - name: Test Windows Online Updater (Windows AMD64)
        if: ${{ matrix.platform == 'windows/amd64' }}
        shell: pwsh
        run: go test ./internal/app -run '^(TestWindowsPowerShellUpdater|TestExpectedAssetNameForExecutableUsesWindowsPortableSuffix|TestShouldWindowsUpdateLaunchDownloadedAssetDirectly|TestResolveUpdateInstallMode|TestExpectedAssetNameForWindowsInstallMode|TestResolveUpdateWorkspaceDirForPlatformSeparatesMSIFromInstallDirectory|TestValidateUpdatePackageForCurrentInstallMode|TestInstallUpdateAndRestartMSI|TestBuildWindowsMSIUpdatePowerShellScript|TestBuildWindowsMSILaunchCommand|TestResolveWindowsMSIExecPath)' -count=1 -timeout=3m

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          echo "🧭 为 ${{ matrix.platform }} 全量生成 driver-agent revision 指纹，避免跨平台沿用旧 revision"
          ./tools/generate-driver-agent-revisions.sh --platform "${{ matrix.platform }}"
          REVISION_HASH="$(python3 - <<'PY'
          import hashlib
          from pathlib import Path

          print(hashlib.sha256(Path("internal/db/driver_agent_revisions_gen.go").read_bytes()).hexdigest())
          PY
          )"
          export GOCACHE="${RUNNER_TEMP}/go-build-${{ matrix.os_name }}-${{ matrix.arch_name }}-${REVISION_HASH}"
          mkdir -p "$GOCACHE"
          echo "🧭 使用隔离 GOCACHE：$GOCACHE"
          if [ -n "${{ matrix.wails_tags }}" ]; then
            wails build -s -skipbindings -platform ${{ matrix.platform }} -clean -o ${{ matrix.build_name }} -tags "${{ matrix.wails_tags }}" -ldflags "-s -w -X GoNavi-Wails/internal/app.AppVersion=${{ github.ref_name }}"
          else
            wails build -s -skipbindings -platform ${{ matrix.platform }} -clean -o ${{ matrix.build_name }} -ldflags "-s -w -X GoNavi-Wails/internal/app.AppVersion=${{ github.ref_name }}"
          fi

      - name: Resolve Platform Driver Revision Diff
        id: revision_diff
        if: ${{ matrix.build_optional_agents && needs.driver_agents.outputs.has_changes == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          BASE_REF="${{ needs.driver_agents.outputs.compare_base }}"
          FALLBACK_DRIVERS="${{ needs.driver_agents.outputs.drivers }}"
          FORCE_GLOBAL_DRIVER_BUILDS="${{ needs.driver_agents.outputs.force_global_driver_builds }}"

          if [[ -z "$BASE_REF" || "$BASE_REF" == "all" || "$FORCE_GLOBAL_DRIVER_BUILDS" == "true" ]]; then
            if [[ "$FORCE_GLOBAL_DRIVER_BUILDS" == "true" && -n "$BASE_REF" && "$BASE_REF" != "all" ]]; then
              echo "⚠️ 当前提交涉及 driver 构建/发布链路，保留全局驱动重建结果：${FALLBACK_DRIVERS}"
            else
              echo "⚠️ 未拿到可比对的历史 release 基线，回退使用全局检测结果：${FALLBACK_DRIVERS}"
            fi
            echo "drivers=${FALLBACK_DRIVERS}" >> "$GITHUB_OUTPUT"
          else
            echo "🧭 对比当前平台 revision：base=${BASE_REF} head=${GITHUB_SHA} platform=${{ matrix.platform }}"
            if DRIVERS="$(bash ./tools/diff-driver-agent-revisions.sh --base "$BASE_REF" --head "$GITHUB_SHA" --platform "${{ matrix.platform }}")"; then
              echo "🧭 当前平台实际需要重建的 driver agents: ${DRIVERS:-<empty>}"
              echo "drivers=${DRIVERS}" >> "$GITHUB_OUTPUT"
            else
              echo "⚠️ revision 差异对比失败，保守回退为全量重建"
              ALL_DRIVERS="$(bash ./tools/detect-changed-driver-agents.sh --base all --head "$GITHUB_SHA")"
              echo "drivers=${ALL_DRIVERS}" >> "$GITHUB_OUTPUT"
            fi
          fi

          DRIVERS="$(sed -n 's/^drivers=//p' "$GITHUB_OUTPUT" | tail -n 1)"
          if [[ -n "$DRIVERS" ]]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Optional Driver Agents
        if: ${{ matrix.build_optional_agents && steps.revision_diff.outputs.has_changes == 'true' }}
        shell: bash
        env:
          CHANGED_DRIVER_AGENTS: ${{ steps.revision_diff.outputs.drivers }}
        run: |
          set -euo pipefail
          TARGET_PLATFORM="${{ matrix.platform }}"
          GOOS="${TARGET_PLATFORM%%/*}"
          GOARCH="${TARGET_PLATFORM##*/}"
          REVISION_HASH="$(python3 - <<'PY'
          import hashlib
          from pathlib import Path

          print(hashlib.sha256(Path("internal/db/driver_agent_revisions_gen.go").read_bytes()).hexdigest())
          PY
          )"
          export GOCACHE="${RUNNER_TEMP}/go-build-${{ matrix.os_name }}-${{ matrix.arch_name }}-${REVISION_HASH}"
          mkdir -p "$GOCACHE"
          echo "🧭 可选驱动使用隔离 GOCACHE：$GOCACHE"
          normalize_driver_token() {
            local value
            value="$(printf '%s' "${1:-}" | tr '[:upper:]' '[:lower:]' | tr -d '[:space:]')"
            case "$value" in
              "") return 1 ;;
              doris|diros) echo "doris" ;;
              open_gauss|open-gauss) echo "opengauss" ;;
              gaussdb|gauss_db|gauss-db) echo "gaussdb" ;;
              elastic|elasticsearch) echo "elasticsearch" ;;
              mariadb|oceanbase|starrocks|sphinx|sqlserver|sqlite|duckdb|dameng|kingbase|highgo|vastbase|opengauss|gaussdb|iris|mongodb|tdengine|iotdb|clickhouse)
                echo "$value"
                ;;
              *)
                echo "❌ 不支持的 driver-agent：${1:-}" >&2
                return 1
                ;;
            esac
          }

          build_driver_name() {
            case "$1" in
              doris) echo "diros" ;;
              *) echo "$1" ;;
            esac
          }

          declare -a RAW_DRIVERS=()
          declare -a DRIVERS=()
          IFS=',' read -r -a RAW_DRIVERS <<< "$CHANGED_DRIVER_AGENTS"
          for RAW_DRIVER in "${RAW_DRIVERS[@]}"; do
            DRIVER="$(normalize_driver_token "$RAW_DRIVER")" || continue
            DRIVERS+=("$DRIVER")
          done
          if [ ${#DRIVERS[@]} -eq 0 ]; then
            echo "🧭 没有需要构建的 driver-agent"
            exit 0
          fi
          NORMALIZED_CHANGED_DRIVER_AGENTS="$(IFS=,; echo "${DRIVERS[*]}")"
          echo "🧭 归一后的 driver-agent 构建列表：${NORMALIZED_CHANGED_DRIVER_AGENTS}"
          OUTDIR="drivers/${{ matrix.os_name }}"
          mkdir -p "$OUTDIR"
          DUCKDB_WINDOWS_LIBRARY_VERSION="v1.4.4"
          DUCKDB_WINDOWS_LIBRARY_URL="https://github.com/duckdb/duckdb/releases/download/${DUCKDB_WINDOWS_LIBRARY_VERSION}/libduckdb-windows-amd64.zip"

          prepare_duckdb_windows_library() {
            local lib_dir="$RUNNER_TEMP/duckdb-windows-${DUCKDB_WINDOWS_LIBRARY_VERSION}"
            local extract_dir="$RUNNER_TEMP/duckdb-windows-extract-${DUCKDB_WINDOWS_LIBRARY_VERSION}"
            local zip_path="$RUNNER_TEMP/libduckdb-windows-amd64.zip"
            if [ -f "$lib_dir/duckdb.dll" ] && [ -f "$lib_dir/libduckdb.dll.a" ] && [ -f "$lib_dir/libduckdb.a" ]; then
              echo "$lib_dir"
              return 0
            fi
            mkdir -p "$lib_dir"
            rm -rf "$extract_dir"
            rm -f "$zip_path"
            local attempt dll_path
            for attempt in 1 2 3; do
              echo "📥 下载 DuckDB Windows 动态库 (${attempt}/3): ${DUCKDB_WINDOWS_LIBRARY_URL}" >&2
              if curl --retry 3 --retry-delay 2 --retry-all-errors --connect-timeout 20 --max-time 300 -fsSL "$DUCKDB_WINDOWS_LIBRARY_URL" -o "$zip_path"; then
                if unzip -tq "$zip_path" >/dev/null 2>&1; then
                  rm -rf "$lib_dir"
                  rm -rf "$extract_dir"
                  mkdir -p "$lib_dir"
                  mkdir -p "$extract_dir"
                  unzip -qo "$zip_path" -d "$extract_dir"
                  dll_path="$(find "$extract_dir" -type f -name duckdb.dll | head -n 1 || true)"
                  if [ -n "$dll_path" ]; then
                    cp "$dll_path" "$lib_dir/duckdb.dll"
                    go run ./cmd/mingw-import-lib \
                      --dll "$lib_dir/duckdb.dll" \
                      --output-lib "$lib_dir/libduckdb.dll.a"
                    cp "$lib_dir/libduckdb.dll.a" "$lib_dir/libduckdb.a"
                    rm -rf "$extract_dir"
                    echo "$lib_dir"
                    return 0
                  fi
                  echo "⚠️ DuckDB Windows 动态库压缩包缺少 duckdb.dll，准备重试" >&2
                else
                  echo "⚠️ DuckDB Windows 动态库压缩包校验失败，准备重试" >&2
                fi
              else
                echo "⚠️ DuckDB Windows 动态库下载失败，准备重试" >&2
              fi
              rm -f "$zip_path"
              rm -rf "$lib_dir"
              rm -rf "$extract_dir"
              mkdir -p "$lib_dir"
              sleep $((attempt * 2))
            done
            echo "❌ 无法准备 DuckDB Windows 动态库：${DUCKDB_WINDOWS_LIBRARY_URL}" >&2
            return 1
          }

          for DRIVER in "${DRIVERS[@]}"; do
            BUILD_DRIVER="$(build_driver_name "$DRIVER")"
            if [ "$DRIVER" = "duckdb" ] && [ "$GOOS" = "windows" ] && [ "$GOARCH" != "amd64" ]; then
              echo "⚠️ 跳过 DuckDB driver（当前平台 ${GOOS}/${GOARCH} 不受支持，仅支持 windows/amd64）"
              continue
            fi
            DRIVER_VARIANTS=("")
            if [ "$DRIVER" = "mongodb" ]; then
              DRIVER_VARIANTS=("v1" "v2" "")
            fi
            for DRIVER_VARIANT in "${DRIVER_VARIANTS[@]}"; do
              TAG="gonavi_${BUILD_DRIVER}_driver"
              BUILD_TAGS="$TAG"
              OUTPUT_STEM="${DRIVER}-driver-agent"
              if [ "$DRIVER" = "mongodb" ]; then
                if [ "$DRIVER_VARIANT" = "v1" ]; then
                  BUILD_TAGS="gonavi_mongodb_driver_v1"
                  OUTPUT_STEM="mongodb-driver-agent-v1"
                elif [ "$DRIVER_VARIANT" = "v2" ]; then
                  BUILD_TAGS="gonavi_mongodb_driver"
                  OUTPUT_STEM="mongodb-driver-agent-v2"
                else
                  BUILD_TAGS="gonavi_mongodb_driver"
                fi
              fi
              OUTPUT="${OUTPUT_STEM}-${GOOS}-${GOARCH}"
              if [ "$GOOS" = "windows" ]; then
                OUTPUT="${OUTPUT}.exe"
              fi
              OUTPUT_PATH="${OUTDIR}/${OUTPUT}"
              DUCKDB_LIB_DIR=""
              if [ "$DRIVER" = "duckdb" ] && [ "$GOOS" = "windows" ] && [ "$GOARCH" = "amd64" ]; then
                DUCKDB_LIB_DIR="$(prepare_duckdb_windows_library)"
                BUILD_TAGS="${BUILD_TAGS} duckdb_use_lib"
              fi
              echo "🔧 构建 ${OUTPUT_PATH} (tags=${BUILD_TAGS})"
              if [ "$DRIVER" = "duckdb" ]; then
                if [ -n "$DUCKDB_LIB_DIR" ]; then
                  DUCKDB_LIB_DIR_GCC="$(cygpath -m "$DUCKDB_LIB_DIR")"
                  DUCKDB_LIB_DIR_PATH="$(cygpath -u "$DUCKDB_LIB_DIR")"
                  # cgo 会把每个 CGO_LDFLAGS 片段转成 //go:cgo_ldflag，-L 参数不能再额外包引号。
                  DUCKDB_WINDOWS_CGO_LDFLAGS="-L${DUCKDB_LIB_DIR_GCC} -lduckdb -lstdc++ -lm -lws2_32 -lwsock32 -lrstrtmgr"
                  CGO_ENABLED=1 GOOS="$GOOS" GOARCH="$GOARCH" CGO_LDFLAGS="${DUCKDB_WINDOWS_CGO_LDFLAGS}" PATH="${DUCKDB_LIB_DIR_PATH}:$PATH" go build \
                    -tags "${BUILD_TAGS}" \
                    -trimpath \
                    -ldflags "-s -w" \
                    -o "${OUTPUT_PATH}" \
                    ./cmd/optional-driver-agent
                  cp "$DUCKDB_LIB_DIR/duckdb.dll" "$OUTDIR/duckdb.dll"
                  bash ./tools/compress-driver-artifact.sh "$OUTDIR/duckdb.dll" "$TARGET_PLATFORM" "${{ matrix.os_name }}/duckdb.dll"
                else
                  CGO_ENABLED=1 GOOS="$GOOS" GOARCH="$GOARCH" go build \
                    -tags "${BUILD_TAGS}" \
                    -trimpath \
                    -ldflags "-s -w" \
                    -o "${OUTPUT_PATH}" \
                    ./cmd/optional-driver-agent
                fi
              else
                CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" go build \
                  -tags "${BUILD_TAGS}" \
                  -trimpath \
                  -ldflags "-s -w" \
                  -o "${OUTPUT_PATH}" \
                  ./cmd/optional-driver-agent
              fi
              bash ./tools/compress-driver-artifact.sh "${OUTPUT_PATH}" "$TARGET_PLATFORM" "${{ matrix.os_name }}/${OUTPUT}"
              if [ "$DRIVER" = "duckdb" ] && [ -n "$DUCKDB_LIB_DIR" ]; then
                DUCKDB_ZIP_PATH="${OUTDIR}/duckdb-driver.zip"
                export DUCKDB_ZIP_PATH
                export DUCKDB_AGENT_PATH="${OUTPUT_PATH}"
                export DUCKDB_DLL_PATH="${OUTDIR}/duckdb.dll"
              python3 - <<'PY'
          import os
          import zipfile

          zip_path = os.environ["DUCKDB_ZIP_PATH"]
          entries = [
              ("Windows/duckdb-driver-agent-windows-amd64.exe", os.environ["DUCKDB_AGENT_PATH"]),
              ("Windows/duckdb.dll", os.environ["DUCKDB_DLL_PATH"]),
          ]

          with zipfile.ZipFile(zip_path, "w", compression=zipfile.ZIP_DEFLATED) as zf:
              for arcname, src in entries:
                  if not os.path.isfile(src):
                      raise FileNotFoundError(src)
                  zf.write(src, arcname)
          PY
                echo "📦 已生成 DuckDB Windows 专属驱动包: ${DUCKDB_ZIP_PATH}"
              fi
            done
          done

          bash ./tools/verify-driver-agent-revisions.sh \
            --assets-dir drivers \
            --platform "$TARGET_PLATFORM" \
            --drivers "$NORMALIZED_CHANGED_DRIVER_AGENTS"

      # macOS Packaging
      - name: Package macOS DMG
        if: contains(matrix.platform, 'darwin')
        run: |
          brew install create-dmg
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          cd build/bin
          
          APP_PATH=$(find . -maxdepth 1 -name "*.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "❌ 未找到 .app 应用包!"
            exit 1
          fi
          APP_NAME=$(basename "$APP_PATH")

          APP_BIN=$(find "$APP_PATH/Contents/MacOS" -maxdepth 1 -type f | head -n 1)
          if [ -z "$APP_BIN" ]; then
            echo "❌ 未找到 macOS 应用主程序!"
            exit 1
          fi
          echo "ℹ️ macOS 产物不执行 UPX 压缩，保留原始主程序。"
          
          echo "🔏 正在进行 Ad-hoc 签名..."
          # 注意：Ad-hoc + hardened runtime（--options runtime）在未配置 entitlements 时，
          # 可能导致部分 macOS 机型上应用双击无响应。这里保持 Ad-hoc 深签名但禁用 runtime hardened。
          if command -v xattr >/dev/null 2>&1; then
            xattr -cr "$APP_NAME" || true
          fi
          codesign --force --deep --sign - "$APP_NAME"
          
          DMG_NAME="${{ matrix.build_name }}.dmg"
          FINAL_NAME="GoNavi-$VERSION-${{ matrix.os_name }}-${{ matrix.arch_name }}${{ matrix.artifact_suffix }}.dmg"
          echo "📦 正在生成 DMG: $DMG_NAME..."
          
          create-dmg \
            --volname "GoNavi Installer" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --icon "$APP_NAME" 200 190 \
            --hide-extension "$APP_NAME" \
            --app-drop-link 600 185 \
            "$DMG_NAME" \
            "$APP_NAME"

          VERIFY_MOUNT_DIR=$(mktemp -d "${TMPDIR:-/tmp}/gonavi-release-verify.XXXXXX")
          hdiutil attach -nobrowse -readonly -mountpoint "$VERIFY_MOUNT_DIR" "$DMG_NAME" >/dev/null
          PACKAGED_APP=$(find "$VERIFY_MOUNT_DIR" -maxdepth 1 -name "*.app" | head -n 1)
          if [ -z "$PACKAGED_APP" ]; then
            echo "❌ DMG 内未找到 .app 应用包!"
            hdiutil detach "$VERIFY_MOUNT_DIR" -quiet >/dev/null 2>&1 || true
            exit 1
          fi
          codesign --verify --deep --strict --verbose=4 "$PACKAGED_APP"
          hdiutil detach "$VERIFY_MOUNT_DIR" -quiet >/dev/null 2>&1 || true
            
          mv "$DMG_NAME" "../../$FINAL_NAME"

      # Windows Packaging
      - name: Package Windows Portable EXE and MSI
        if: contains(matrix.platform, 'windows')
        shell: pwsh
        run: |
          Set-Location build/bin
          $version = "${{ github.ref_name }}"
          if ($version.StartsWith("v")) {
              $version = $version.Substring(1)
          }
          $target = "${{ matrix.build_name }}"
          $archName = "${{ matrix.arch_name }}"
          $portableExeName = "GoNavi-$version-${{ matrix.os_name }}-$archName${{ matrix.artifact_suffix }}-Portable.exe"
          $msiName = "GoNavi-$version-${{ matrix.os_name }}-$archName${{ matrix.artifact_suffix }}-Installer.msi"

          if (Test-Path "$target.exe") {
              $finalExe = "$target.exe"
          } elseif (Test-Path "$target") {
              Rename-Item -Path "$target" -NewName "$target.exe"
              $finalExe = "$target.exe"
          } else {
              Write-Error "❌ 未找到构建产物 '$target'!"
              exit 1
          }

          $isArm64Target = "${{ matrix.arch_name }}".ToLowerInvariant() -eq "arm64"
          if ($isArm64Target) {
              Write-Warning "⚠️ UPX 当前不支持 win64/arm64，跳过压缩并保留原始 EXE。"
              $LASTEXITCODE = 0
          } else {
              $upxCmd = Get-Command upx -ErrorAction SilentlyContinue
              if ($null -eq $upxCmd) {
                  Write-Error "❌ 未找到 upx，无法保证 Windows 产物经过压缩"
                  exit 1
              }
              $beforeBytes = (Get-Item -LiteralPath $finalExe).Length
              Write-Host "🗜️ 使用 UPX 压缩 $finalExe ..."
              & upx --best --lzma --force $finalExe | Out-Host
              if ($LASTEXITCODE -ne 0) {
                  Write-Error "❌ UPX 压缩失败（$LASTEXITCODE）"
                  exit 1
              }
              & upx -t $finalExe | Out-Host
              if ($LASTEXITCODE -ne 0) {
                  Write-Error "❌ UPX 校验失败（$LASTEXITCODE）"
                  exit 1
              }
              $afterBytes = (Get-Item -LiteralPath $finalExe).Length
              if ($afterBytes -lt $beforeBytes) {
                  $savedBytes = $beforeBytes - $afterBytes
                  Write-Host ("✅ UPX 压缩完成：{0:N2}MB -> {1:N2}MB，减少 {2:N2}MB" -f ($beforeBytes / 1MB), ($afterBytes / 1MB), ($savedBytes / 1MB))
              } else {
                  Write-Host ("ℹ️ UPX 压缩完成：{0:N2}MB -> {1:N2}MB" -f ($beforeBytes / 1MB), ($afterBytes / 1MB))
              }
          }

          Write-Host "📦 输出 Windows Portable 可执行文件 $portableExeName..."
          Copy-Item -LiteralPath $finalExe -Destination "..\\..\\$portableExeName" -Force

          if ($version -match '^(?<major>\d+)\.(?<minor>\d+)\.(?<build>\d+)(?:[-+].*)?$') {
              $major = [int]$Matches.major
              $minor = [int]$Matches.minor
              $build = [int]$Matches.build
          } else {
              throw "Windows MSI 版本必须是 major.minor.patch 格式，当前为: $version"
          }
          if ($major -gt 255 -or $minor -gt 255 -or $build -gt 65535) {
              throw "Windows MSI 版本超出范围 (major/minor <= 255, patch <= 65535): $version"
          }
          $productVersion = "$major.$minor.$build"
          $wixArch = if ($archName -eq "Arm64") { "arm64" } else { "x64" }
          $componentGuid = if ($archName -eq "Arm64") {
              "7F4C7757-329F-42B0-B312-D4B8AD50415E"
          } else {
              "0BCEE70B-9CF2-449C-9ADE-190188493234"
          }

          $licenseText = Get-Content -LiteralPath "..\\..\\LICENSE" -Raw
          $escapedLicense = $licenseText.Replace('\', '\\').Replace('{', '\{').Replace('}', '\}')
          $escapedLicense = $escapedLicense -replace "`r?`n", "\par`r`n"
          $licenseRtf = Join-Path $env:RUNNER_TEMP "GoNavi-License.rtf"
          $rtfContent = "{\rtf1\ansi\deff0{\fonttbl{\f0 Segoe UI;}}\f0\fs18 $escapedLicense}"
          Set-Content -LiteralPath $licenseRtf -Value $rtfContent -Encoding ascii

          $sourceExe = (Resolve-Path -LiteralPath $finalExe).Path
          $wxsPath = (Resolve-Path -LiteralPath "..\\windows\\installer.wxs").Path
          $iconPath = (Resolve-Path -LiteralPath "..\\windows\\icon.ico").Path
          $installMarkerPath = Join-Path $env:RUNNER_TEMP ".gonavi-msi-install"
          Set-Content -LiteralPath $installMarkerPath -Value "MSI" -Encoding ascii -NoNewline
          $installMarkerPath = (Resolve-Path -LiteralPath $installMarkerPath).Path
          $wixIntermediateDir = Join-Path $env:RUNNER_TEMP "wixobj-$archName"
          Write-Host "📦 生成 Windows MSI 安装程序 $msiName (version=$productVersion arch=$wixArch)..."
          wix build $wxsPath `
              -arch $wixArch `
              -ext "WixToolset.UI.wixext/6.0.2" `
              -d "ProductName=GoNavi" `
              -d "ProductVersion=$productVersion" `
              -d "UpgradeCode=CDD6BF2F-ED1E-4345-A0AB-DCDB7E15FB23" `
              -d "ComponentGuid=$componentGuid" `
              -d "InstallFolderName=GoNavi" `
              -d "RegistryKeyName=GoNavi" `
              -d "SourceExe=$sourceExe" `
              -d "InstallMarker=$installMarkerPath" `
              -d "IconPath=$iconPath" `
              -d "LicenseRtf=$licenseRtf" `
              -pdbtype none `
              -intermediatefolder $wixIntermediateDir `
              -out "..\\..\\$msiName"
          if ($LASTEXITCODE -ne 0) {
              throw "WiX MSI 构建失败，退出码: $LASTEXITCODE"
          }

      # Linux Packaging (tar.gz and AppImage)
      - name: Package Linux
        if: contains(matrix.platform, 'linux')
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          cd build/bin
          TARGET="${{ matrix.build_name }}"
          TAR_NAME="GoNavi-$VERSION-${{ matrix.os_name }}-${{ matrix.arch_name }}${{ matrix.artifact_suffix }}.tar.gz"
          APPIMAGE_NAME="GoNavi-$VERSION-${{ matrix.os_name }}-${{ matrix.arch_name }}${{ matrix.artifact_suffix }}.AppImage"

          if [ ! -f "$TARGET" ]; then
              echo "❌ 未找到构建产物 '$TARGET'!"
              exit 1
          fi

          chmod +x "$TARGET"
          BEFORE_BYTES=$(wc -c <"$TARGET" | tr -d '[:space:]')
          echo "🗜️ 正在使用 UPX 压缩 Linux 可执行文件: $TARGET ..."
          upx --best --lzma --force "$TARGET"
          upx -t "$TARGET"
          AFTER_BYTES=$(wc -c <"$TARGET" | tr -d '[:space:]')
          if [ "$AFTER_BYTES" -lt "$BEFORE_BYTES" ]; then
              SAVED_BYTES=$((BEFORE_BYTES - AFTER_BYTES))
              awk -v b="$BEFORE_BYTES" -v a="$AFTER_BYTES" -v s="$SAVED_BYTES" 'BEGIN { printf "✅ Linux UPX 压缩完成：%.2fMB -> %.2fMB，减少 %.2fMB\n", b/1024/1024, a/1024/1024, s/1024/1024 }'
          else
              awk -v b="$BEFORE_BYTES" -v a="$AFTER_BYTES" 'BEGIN { printf "ℹ️ Linux UPX 压缩完成：%.2fMB -> %.2fMB\n", b/1024/1024, a/1024/1024 }'
          fi

          # 1. Create tar.gz
          echo "📦 正在打包 $TAR_NAME..."
          tar -czvf "$TAR_NAME" "$TARGET"
          mv "$TAR_NAME" ../../

          # 2. Create AppImage (skip for ARM64 or if tools unavailable)
          if [ -f /tmp/skip-appimage ]; then
              echo "⚠️ 跳过 AppImage 打包"
              exit 0
          fi

          echo "📦 正在生成 AppImage..."

          # Create AppDir structure
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps

          cp "$TARGET" AppDir/usr/bin/gonavi

          # Create desktop file
          printf '%s\n' \
            '[Desktop Entry]' \
            'Name=GoNavi' \
            'Exec=gonavi' \
            'Icon=gonavi' \
            'Type=Application' \
            'Categories=Development;Database;' \
            'Comment=Database Management Tool' \
            > AppDir/usr/share/applications/gonavi.desktop

          cp AppDir/usr/share/applications/gonavi.desktop AppDir/gonavi.desktop

          # Create a simple icon (or use existing if available)
          if [ -f "../../build/appicon.png" ]; then
              cp "../../build/appicon.png" AppDir/usr/share/icons/hicolor/256x256/apps/gonavi.png
              cp "../../build/appicon.png" AppDir/gonavi.png
          else
              # Create a placeholder icon
              convert -size 256x256 xc:#336791 -fill white -gravity center -pointsize 48 -annotate 0 "GoNavi" AppDir/gonavi.png || \
              wget -q "https://via.placeholder.com/256/336791/FFFFFF?text=GoNavi" -O AppDir/gonavi.png || \
              touch AppDir/gonavi.png
              cp AppDir/gonavi.png AppDir/usr/share/icons/hicolor/256x256/apps/gonavi.png
          fi

          # Build AppImage
          export DEPLOY_GTK_VERSION=3
          /tmp/linuxdeploy --appdir AppDir --plugin gtk --output appimage || {
              echo "⚠️ AppImage 生成失败，但 tar.gz 已成功生成"
              exit 0
          }

          # Rename output
          mv GoNavi*.AppImage "$APPIMAGE_NAME" 2>/dev/null || {
              echo "⚠️ AppImage 重命名失败"
              exit 0
          }

          if [ -f "$APPIMAGE_NAME" ]; then
              mv "$APPIMAGE_NAME" ../../
              echo "✅ AppImage 生成成功"
          fi

      # Upload to Actions Artifacts (Temporary Storage)
      - name: Upload Artifact
        uses: actions/upload-artifact@v6
        with:
          name: build-artifacts-${{ strategy.job-index }} # Unique name per job
          path: |
            GoNavi-*.dmg
            GoNavi-*.exe
            GoNavi-*.msi
            GoNavi-*.tar.gz
            GoNavi-*.AppImage
            drivers/**
          retention-days: 1

  # Phase 2: Collect all artifacts and Publish Release (Single Job)
  release:
    name: Publish Release
    needs:
      - build
      - driver_agents
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download All Artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-assets
          pattern: build-artifacts-*
          merge-multiple: true

      - name: List Assets
        run: ls -R release-assets

      - name: Complete Driver Agent Assets
        if: needs.driver_agents.outputs.has_changes == 'true' && needs.driver_agents.outputs.release_source != 'all'
        env:
          DRIVER_RELEASE_TOKEN: ${{ secrets.DRIVER_RELEASE_TOKEN }}
        run: |
          python3 tools/complete-driver-release-assets.py \
            --assets-dir release-assets \
            --source "${{ needs.driver_agents.outputs.release_source }}" \
            --require-complete

      - name: Verify Optional Driver Assets
        if: needs.driver_agents.outputs.has_changes == 'true'
        shell: bash
        env:
          CHANGED_DRIVER_AGENTS: ${{ needs.driver_agents.outputs.drivers }}
        run: |
          set -euo pipefail
          cd release-assets

          missing=0
          IFS=',' read -r -a DRIVERS <<< "$CHANGED_DRIVER_AGENTS"
          for driver in "${DRIVERS[@]}"; do
            REQUIRED_FILES=(
              "drivers/Windows/${driver}-driver-agent-windows-amd64.exe"
              "drivers/MacOS/${driver}-driver-agent-darwin-amd64"
              "drivers/MacOS/${driver}-driver-agent-darwin-arm64"
              "drivers/Linux/${driver}-driver-agent-linux-amd64"
            )
            if [ "$driver" != "duckdb" ]; then
              REQUIRED_FILES+=("drivers/Windows/${driver}-driver-agent-windows-arm64.exe")
            else
              REQUIRED_FILES+=("drivers/Windows/duckdb.dll")
              REQUIRED_FILES+=("drivers/Windows/duckdb-driver.zip")
            fi

            for file in "${REQUIRED_FILES[@]}"; do
              if [ ! -f "$file" ]; then
                echo "❌ 缺少驱动资产：$file"
                missing=1
              else
                echo "✅ 已找到驱动资产：$file"
              fi
            done
          done

          if [ "$missing" -ne 0 ]; then
            echo "❌ 可选驱动资产不完整，终止发布"
            exit 1
          fi

      - name: Package Driver Agents Bundle
        id: driver_assets
        shell: bash
        run: |
          set -euo pipefail
          cd release-assets
          if [ ! -d drivers ]; then
            echo "⚠️ 未找到 drivers 目录，跳过驱动总包打包"
            echo "has_driver_assets=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -z "$(find drivers -type f 2>/dev/null | head -n 1)" ]; then
            echo "⚠️ drivers 目录为空，跳过驱动总包打包"
            rm -rf drivers
            echo "has_driver_assets=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "📦 打包驱动总包：GoNavi-DriverAgents.zip"
          python3 ../tools/package-driver-release-assets.py \
            drivers \
            ../driver-release-assets

          python3 ../tools/generate-driver-release-manifest.py \
            --assets-dir drivers \
            --output ../driver-release-assets/GoNavi-DriverAgents-Manifest.json

          # GoNavi 主仓库只保留主程序包；驱动资产发布到独立仓库。
          rm -rf drivers
          echo "has_driver_assets=true" >> "$GITHUB_OUTPUT"

      - name: Generate SHA256SUMS
        shell: bash
        run: |
          cd release-assets
          FILES=()
          while IFS= read -r file; do
            if [ -n "$file" ]; then
              case "$file" in
                SHA256SUMS|latest.json|latest-dev.json) continue ;;
              esac
              FILES+=("$file")
            fi
          done < <(find . -maxdepth 1 -type f ! -name SHA256SUMS -exec basename {} \; | sort)
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "⚠️ 未找到可签名资产，生成空 SHA256SUMS"
            : > SHA256SUMS
          else
            sha256sum "${FILES[@]}" > SHA256SUMS
          fi

      # 静态更新清单：客户端优先下载 github.com/.../latest/download/latest.json，
      # 避免终端用户检查更新打爆 api.github.com 未认证配额。
      - name: Generate static update manifest (latest.json)
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          python3 tools/generate-update-latest-manifest.py \
            --assets-dir release-assets \
            --version "$VERSION" \
            --tag "$TAG" \
            --channel latest \
            --output release-assets/latest.json
          test -s release-assets/latest.json
          echo "📄 latest.json ready:"
          head -n 40 release-assets/latest.json

      - name: Generate Driver SHA256SUMS
        if: steps.driver_assets.outputs.has_driver_assets == 'true'
        shell: bash
        run: |
          cd driver-release-assets
          FILES=()
          while IFS= read -r file; do
            if [ -n "$file" ]; then
              FILES+=("$file")
            fi
          done < <(find . -maxdepth 1 -type f ! -name SHA256SUMS -exec basename {} \; | sort)
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "❌ 未找到驱动发布资产"
            exit 1
          fi
          sha256sum "${FILES[@]}" > SHA256SUMS

      - name: Create Driver Agents Release
        if: startsWith(github.ref, 'refs/tags/') && steps.driver_assets.outputs.has_driver_assets == 'true'
        env:
          GH_TOKEN: ${{ secrets.DRIVER_RELEASE_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t DRIVER_RELEASE_ASSETS < <(find driver-release-assets -maxdepth 1 -type f | sort)
          if [ ${#DRIVER_RELEASE_ASSETS[@]} -eq 0 ]; then
            echo "未找到 driver release assets"
            exit 1
          fi

          NOTES_FILE="$RUNNER_TEMP/driver-release-notes.md"
          cat > "$NOTES_FILE" <<'EOF'
            GoNavi driver-agent assets for `${{ github.ref_name }}`.
          EOF

          gh release create "${{ github.ref_name }}" "${DRIVER_RELEASE_ASSETS[@]}" \
            --repo Syngnat/GoNavi-DriverAgents \
            --title "GoNavi Driver Agents ${{ github.ref_name }}" \
            --notes-file "$NOTES_FILE" \
            --latest

      - name: Checkout code for changelog
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          path: repo-for-changelog

      - name: Generate Changelog
        id: changelog
        shell: bash
        run: |
          set -euo pipefail
          cd repo-for-changelog
          TAG="${{ github.ref_name }}"
          # 获取上一个 tag
          PREV_TAG=$(git tag --sort=-creatordate | grep -E '^v' | sed -n '2p' || true)
          if [ -z "$PREV_TAG" ]; then
            echo "⚠️ 未找到上一个 tag，使用全部 commit"
            RANGE="$TAG"
          else
            RANGE="${PREV_TAG}..${TAG}"
          fi

          echo "📋 生成更新日志：$RANGE"

          # 提取 commit 消息（排除 merge commit）
          COMMITS=$(git log "$RANGE" --no-merges --pretty=format:'%s' 2>/dev/null || true)
          if [ -z "$COMMITS" ]; then
            BODY="暂无提交记录。"
          else
            CAT_FEAT=""
            CAT_FIX=""
            CAT_PERF=""
            CAT_REFACTOR=""
            CAT_I18N=""
            CAT_OTHER=""

            while IFS= read -r line; do
              [ -z "$line" ] && continue
              case "$line" in
                ✨*|*feat*)     CAT_FEAT="${CAT_FEAT}\n- ${line}" ;;
                🐛*|*fix*)     CAT_FIX="${CAT_FIX}\n- ${line}" ;;
                ⚡*|*perf*)    CAT_PERF="${CAT_PERF}\n- ${line}" ;;
                ♻️*|*refactor*) CAT_REFACTOR="${CAT_REFACTOR}\n- ${line}" ;;
                🌐*)           CAT_I18N="${CAT_I18N}\n- ${line}" ;;
                🔧*|🔨*|*chore*) CAT_OTHER="${CAT_OTHER}\n- ${line}" ;;
                *)             CAT_OTHER="${CAT_OTHER}\n- ${line}" ;;
              esac
            done <<< "$COMMITS"

            BODY=""
            [ -n "$CAT_FEAT" ]     && BODY="${BODY}## ✨ 新功能\n${CAT_FEAT}\n\n"
            [ -n "$CAT_FIX" ]      && BODY="${BODY}## 🐛 问题修复\n${CAT_FIX}\n\n"
            [ -n "$CAT_PERF" ]     && BODY="${BODY}## ⚡ 性能优化\n${CAT_PERF}\n\n"
            [ -n "$CAT_REFACTOR" ] && BODY="${BODY}## ♻️ 重构\n${CAT_REFACTOR}\n\n"
            [ -n "$CAT_I18N" ]     && BODY="${BODY}## 🌐 国际化\n${CAT_I18N}\n\n"
            [ -n "$CAT_OTHER" ]    && BODY="${BODY}## 🔧 其他变更\n${CAT_OTHER}\n\n"

            # 附加 compare 链接
            if [ -n "$PREV_TAG" ]; then
              REPO_URL="${{ github.server_url }}/${{ github.repository }}"
              BODY="${BODY}---\n**完整变更**: [${PREV_TAG}...${TAG}](${REPO_URL}/compare/${PREV_TAG}...${TAG})\n"
            fi
          fi

          # 写入到文件避免多行环境变量问题
          printf '%b' "$BODY" > /tmp/changelog.md
          echo "changelog_file=/tmp/changelog.md" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: release-assets/*
          draft: true
          make_latest: true
          body_path: ${{ steps.changelog.outputs.changelog_file }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
