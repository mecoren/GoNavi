apiVersion: apps/v1
kind: Deployment
metadata:
  name: gonavi-mcp-server
  namespace: gonavi
spec:
  template:
    spec:
      containers:
        - name: gonavi-mcp-server
          volumeMounts:
            - name: gonavi-drivers
              mountPath: /data/drivers
              readOnly: true
      volumes:
        - name: gonavi-drivers
          persistentVolumeClaim:
            claimName: gonavi-drivers
